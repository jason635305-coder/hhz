<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gear Monitor Pro</title>
    <style>
        body { 
            background: #000; 
            color: #ccc; 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
        }
        header { 
            padding: 15px; 
            background: #111; 
            border-bottom: 2px solid #333; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        h2 { margin: 0; font-size: 18px; color: #fcfdbf; letter-spacing: 1px; }
        .status { font-size: 14px; color: #0f0; display: flex; align-items: center; gap: 5px; }
        .dot { width: 8px; height: 8px; background: #0f0; border-radius: 50%; box-shadow: 0 0 5px #0f0; }

        /* Dashboard Layout */
        .dashboard { 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            flex-grow: 1; 
        }
        .panel { text-align: center; padding: 15px; }
        .panel-title { font-size: 14px; color: #888; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 5px; }
        
        .panel-value { font-size: 80px; font-weight: bold; color: #0ff; text-shadow: 0 0 20px rgba(0,255,255,0.4); line-height: 1; }
        .panel-value.gear { color: #ffcc00; font-size: 140px; text-shadow: 0 0 30px rgba(255,204,0,0.5); }
        .unit { font-size: 20px; color: #555; margin-left: 5px; }

        /* Visualizer */
        #visualizer {
            width: 100%;
            height: 120px;
            background: #050505;
            border-top: 1px solid #222;
        }

        #start-btn { 
            position: fixed; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            padding: 20px 50px; 
            font-size: 22px; 
            font-weight: bold;
            background: #0f0; 
            color: #000; 
            border: none; 
            border-radius: 50px; 
            cursor: pointer; 
            z-index: 100; 
            box-shadow: 0 0 30px rgba(0,255,0,0.3);
        }
    </style>
</head>
<body>

<button id="start-btn">START MONITOR</button>

<header>
    <h2>GEAR MONITOR PRO</h2>
    <div id="status-container" style="display: none;">
        <div class="status"><span class="dot"></span> LIVE</div>
    </div>
</header>

<div class="dashboard">
    <div class="panel">
        <div class="panel-title">Current Gear</div>
        <div><span id="gear-val" class="panel-value gear">-</span></div>
    </div>
    
    <div class="panel">
        <div class="panel-title">Peak Frequency</div>
        <div><span id="hz-val" class="panel-value">0</span><span class="unit">Hz</span></div>
    </div>
</div>

<canvas id="visualizer"></canvas>

<script>
    let audioContext, analyser, dataArray, canvas, canvasCtx;
    let candidateGear = "-";
    let candidateStartTime = 0;
    let currentGear = "-";

    // Parameters (You can adjust these values for your vehicle)
    const FREQ_TOLERANCE = 4.0;
    const HOLD_TIME_MS = 1500; 
    const NOISE_THRESHOLD = 45; 

    const btn = document.getElementById('start-btn');
    btn.onclick = function() {
        btn.style.display = 'none';
        document.getElementById('status-container').style.display = 'block';
        initAudio();
    };

    async function initAudio() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 4096; 
            
            const source = audioContext.createMediaStreamSource(stream);
            source.connect(analyser);

            dataArray = new Uint8Array(analyser.frequencyBinCount);
            
            // Setup Visualizer
            canvas = document.getElementById('visualizer');
            canvasCtx = canvas.getContext('2d');
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            update();
        } catch (err) {
            alert("Microphone Access Denied: " + err);
        }
    }

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = 120;
    }

    function update() {
        analyser.getByteFrequencyData(dataArray);

        // Find the strongest frequency between 40Hz and 500Hz
        let maxVal = -1;
        let maxIndex = -1;
        const binSize = audioContext.sampleRate / analyser.fftSize;
        const lowLimit = Math.floor(40 / binSize);
        const highLimit = Math.floor(500 / binSize);

        for (let i = lowLimit; i < highLimit; i++) {
            if (dataArray[i] > maxVal) {
                maxVal = dataArray[i];
                maxIndex = i;
            }
        }

        const nyquist = audioContext.sampleRate / 2;
        const hz = maxIndex * (nyquist / dataArray.length);
        
        let detectedHz = 0;
        if (maxVal > NOISE_THRESHOLD) {
            detectedHz = hz;
        }

        document.getElementById('hz-val').innerText = Math.round(detectedHz);

        // Gear Detection Logic Based on Frequency
        let detectedGear = "-";
        if (detectedHz === 0) {
            detectedGear = "0";
        } else {
            // Gear 3: 84Hz or 94Hz
            if (Math.abs(detectedHz - 84) <= FREQ_TOLERANCE || Math.abs(detectedHz - 94) <= FREQ_TOLERANCE) detectedGear = "3";
            // Gear 4: 125Hz or 133Hz
            else if (Math.abs(detectedHz - 125) <= FREQ_TOLERANCE || Math.abs(detectedHz - 133) <= FREQ_TOLERANCE) detectedGear = "4";
            // Gear 5: 148Hz
            else if (Math.abs(detectedHz - 148) <= FREQ_TOLERANCE) detectedGear = "5";
        }

        // Stability Timer Logic
        if (detectedGear !== "-") {
            if (candidateGear === detectedGear) {
                if (Date.now() - candidateStartTime >= HOLD_TIME_MS) {
                    currentGear = detectedGear;
                }
            } else {
                candidateGear = detectedGear;
                candidateStartTime = Date.now();
            }
        }

        document.getElementById('gear-val').innerText = currentGear;

        // Draw Visualizer Bar Chart
        drawVisualizer();
        requestAnimationFrame(update);
    }

    function drawVisualizer() {
        canvasCtx.fillStyle = '#050505';
        canvasCtx.fillRect(0, 0, canvas.width, canvas.height);

        const barWidth = (canvas.width / 100);
        let x = 0;

        for (let i = 0; i < 100; i++) {
            const barHeight = dataArray[i] / 2;
            canvasCtx.fillStyle = `rgb(0, ${barHeight + 100}, 255)`;
            canvasCtx.fillRect(x, canvas.height - barHeight, barWidth - 1, barHeight);
            x += barWidth;
        }
    }
</script>
</body>
</html>
